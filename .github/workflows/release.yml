name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: python -m pip install build

      - name: Build package
        run: python -m build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
