name: AgentBOM Security Scan

on:
  push:
    branches: [main]

  pull_request:

permissions:
  security-events: write
  contents: read

jobs:
  agentbom:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Run AgentBOM
        id: agentbom
        uses: vlcak27/agentbom@v0.5.1
        with:
          path: .
          # Public demo mode: surface findings in reports and GitHub code scanning,
          # but do not fail CI on high or critical findings by default.
          fail-on: none
          sarif-upload: true
          html: true
          output-dir: agentbom-report
          # Enforcement examples for teams ready to gate merges:
          # fail-on: high
          # fail-on: critical

      - name: Upload AgentBOM reports
        uses: actions/upload-artifact@v4
        with:
          name: agentbom-report
          path: agentbom-report/
          if-no-files-found: error
